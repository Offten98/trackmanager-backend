<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - TrackManager Pro</title>
    <style>
        body { background-color: #060608; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, transparent 50%); color: white; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 50px 40px; width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h1 { font-family: 'Impact', sans-serif; letter-spacing: 3px; margin-bottom: 5px; color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.1); font-size: 28px; }
        .seccion-titulo { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; font-weight: 600; font-size: 11px; color: #aaaabb; letter-spacing: 4px; margin-bottom: 35px; margin-top: 10px; text-transform: uppercase; }
        
        .formulario-vertical { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        label { font-size: 11px; font-weight: 600; color: #666677; margin-left: 5px; letter-spacing: 1px; text-transform: uppercase; }
        input, select { background: rgba(10, 10, 15, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 14px; border-radius: 12px; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; font-size: 13px; outline: none; transition: border 0.3s; }
        input:focus, select:focus { border-color: rgba(255, 255, 255, 0.4); }
        option { background: #0A0A0F; color: white; }
        
        button { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 14px; border-radius: 12px; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.4s ease; letter-spacing: 2px; margin-top: 15px; text-align: center; }
        button:hover { background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.5); }

        .btn-cancelar { text-align: center; color: #666677; text-decoration: none; font-size: 12px; font-weight: 600; margin-top: 15px; display: block; transition: color 0.3s; }
        .btn-cancelar:hover { color: white; }

        .alerta-error { background: rgba(255, 85, 85, 0.1); border: 1px solid rgba(255, 85, 85, 0.3); color: #ff8888; padding: 12px; border-radius: 12px; font-size: 11px; margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>OFFTEN STUDIO</h1>
        <div class="seccion-titulo">CREAR NUEVA CUENTA</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="alerta-error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/registro" class="formulario-vertical">
            <label>Correo Electrónico Real:</label>
            <input type="email" name="correo" placeholder="ejemplo@correo.com" required autocomplete="off">
            
            <label>Tipo de Cuenta:</label>
            <select name="tipo_cuenta">
                <option value="Artista Independiente">Artista Independiente</option>
                <option value="Mánager Premium">Mánager Premium</option>
            </select>

            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="••••••••" required>
            
            <button type="submit">CREAR MI CUENTA</button>
            <a href="/login" class="btn-cancelar">VOLVER AL ACCESO</a>
        </form>
    </div>
</body>
</html>
